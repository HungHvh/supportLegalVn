version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - legal-network
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  legal-network:
    name: legal-network
    driver: bridge
