version: '3.8'

services:
  api:
    build: .
    container_name: legal-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    networks:
      - legal-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - legal-network
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  legal-network:
    name: legal-network
    driver: bridge
